name: telephony_context
description: >-
  Android-only Flutter plugin that reads basic Telephony / SIM context without
  runtime permission prompts (for antifraud-style signals).
version: 0.1.0
homepage: https://github.com/6litz/telephony-context
repository: https://github.com/6litz/telephony-context
issue_tracker: https://github.com/6litz/telephony-context/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

topics:
  - flutter
  - plugin
  - android
  - telephony
  - sim

flutter:
  plugin:
    platforms:
      android:
        package: io.github.telephony_context
        pluginClass: TelephonyContextPlugin
